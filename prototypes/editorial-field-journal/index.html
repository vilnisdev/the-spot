<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Spot — Field Journal</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* ─── TOKENS ───────────────────────────────────────────────── */
    :root {
      --paper:      #FAF8F3;
      --ink:        #2C2416;
      --ink-faint:  #9A8C78;
      --sepia:      #8B7355;
      --tan:        #C4A882;
      --tan-light:  #E8DECE;
      --rule:       #D4C8B4;
      --panel-bg:   #F4F0E8;
      --modal-bg:   #FEFCF8;
      --accent:     #7A5C38;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-body:  'Source Serif 4', Georgia, serif;
    }

    [data-theme="dark"] {
      --paper:      #1A1610;
      --ink:        #E8E0D0;
      --ink-faint:  #7A7060;
      --sepia:      #A09070;
      --tan:        #6A5840;
      --tan-light:  #2E2820;
      --rule:       #3A3028;
      --panel-bg:   #211E18;
      --modal-bg:   #1E1B14;
      --accent:     #C4A882;
    }

    /* ─── RESET ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      transition: background 500ms ease, color 500ms ease;
    }

    /* ─── MAP ───────────────────────────────────────────────────── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Suppress Leaflet default attribution style */
    .leaflet-control-attribution {
      font-family: var(--font-body) !important;
      font-size: 0.65rem !important;
      color: var(--ink-faint) !important;
      background: color-mix(in srgb, var(--paper) 80%, transparent) !important;
      border-radius: 0 !important;
      padding: 2px 6px !important;
    }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: none !important;
    }
    .leaflet-control-zoom a {
      font-family: var(--font-serif) !important;
      color: var(--ink) !important;
      background: var(--paper) !important;
      border: 1px solid var(--rule) !important;
      width: 28px !important;
      height: 28px !important;
      line-height: 26px !important;
      font-size: 1rem !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--tan-light) !important;
      color: var(--accent) !important;
    }

    /* ─── APP NAME ──────────────────────────────────────────────── */
    #app-name {
      position: fixed;
      top: 20px;
      left: 64px;
      z-index: 100;
      font-family: var(--font-serif);
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    #app-name span {
      display: block;
      font-family: var(--font-body);
      font-size: 0.62rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.22em;
      color: var(--sepia);
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ─── HAMBURGER ─────────────────────────────────────────────── */
    #menu-toggle {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 200;
      width: 34px;
      height: 34px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0.45;
      transition: opacity 900ms ease;
    }
    #menu-toggle:hover { opacity: 0.85; }
    #menu-toggle .bar {
      display: block;
      width: 100%;
      height: 1px;
      background: var(--ink);
      transition: background 500ms;
    }
    #menu-toggle .bar:nth-child(2) { width: 70%; }

    /* ─── SIDE PANEL ────────────────────────────────────────────── */
    #side-panel {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 150;
      width: 300px;
      height: 100%;
      background: var(--panel-bg);
      border-right: 1px solid var(--rule);
      transform: translateX(-100%);
      transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #side-panel.open { transform: translateX(0); }

    .panel-header {
      padding: 28px 24px 18px;
      border-bottom: 1px solid var(--rule);
    }
    .panel-header .the-spot {
      font-family: var(--font-serif);
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }
    .panel-header .edition {
      font-family: var(--font-body);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sepia);
      margin-top: 5px;
      font-style: italic;
    }

    /* ornamental rule */
    .panel-rule {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      margin: 4px 0;
    }
    .panel-rule::before,
    .panel-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .panel-rule svg { flex-shrink: 0; }

    .panel-nav {
      padding: 16px 0;
      flex: 1;
    }
    .panel-nav a {
      display: block;
      padding: 11px 24px;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
      transition: color 300ms, background 300ms;
      cursor: pointer;
    }
    .panel-nav a:hover {
      color: var(--accent);
      background: color-mix(in srgb, var(--tan) 8%, transparent);
    }

    .panel-footer {
      padding: 18px 24px;
      border-top: 1px solid var(--rule);
      font-family: var(--font-body);
      font-size: 0.62rem;
      font-weight: 300;
      font-style: italic;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
    }

    /* settings pane */
    #settings-pane {
      display: none;
      padding: 0 24px 16px;
    }
    #settings-pane.visible { display: block; }
    .settings-label {
      font-family: var(--font-body);
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sepia);
      margin-bottom: 10px;
      font-style: italic;
    }
    .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .theme-row span {
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* toggle switch */
    .toggle-wrap { position: relative; width: 40px; height: 22px; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--rule);
      border-radius: 22px;
      cursor: pointer;
      transition: background 400ms;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--paper);
      transition: transform 400ms, background 400ms;
    }
    input:checked ~ .toggle-track { background: var(--accent); }
    input:checked ~ .toggle-track::after { transform: translateX(18px); }

    /* ─── SEARCH BAR ────────────────────────────────────────────── */
    #search-wrap {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: min(480px, calc(100vw - 48px));
    }
    #search-wrap label {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--ink-faint);
      padding: 8px 4px;
      background: transparent;
      transition: border-color 700ms;
    }
    #search-wrap label:focus-within { border-color: var(--accent); }
    #search-wrap svg { color: var(--ink-faint); flex-shrink: 0; }
    #search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--ink);
    }
    #search-input::placeholder {
      color: var(--ink-faint);
      opacity: 1;
    }

    /* ─── CUSTOM MAP PINS ───────────────────────────────────────── */
    .spot-pin {
      width: 16px;
      height: 22px;
      position: relative;
    }

    /* ─── SPOT MODAL ────────────────────────────────────────────── */
    #spot-modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 300;
      max-height: 72vh;
      transform: translateY(100%);
      transition: transform 750ms cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--modal-bg);
      border-top: 1px solid var(--rule);
      overflow: hidden;
    }
    #spot-modal.open { transform: translateY(0); }

    /* top ornamental bar */
    .modal-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px 0;
      position: relative;
    }
    .modal-bar-line {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .modal-bar-ornament {
      padding: 0 12px;
      color: var(--sepia);
    }
    #close-modal {
      position: absolute;
      right: 20px;
      top: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--ink-faint);
      opacity: 0.45;
      transition: opacity 400ms;
      line-height: 1;
      padding: 4px;
    }
    #close-modal:hover { opacity: 0.9; }

    .modal-inner {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      max-height: calc(72vh - 36px);
      overflow-y: auto;
    }

    /* scrollbar */
    .modal-inner::-webkit-scrollbar { width: 3px; }
    .modal-inner::-webkit-scrollbar-track { background: transparent; }
    .modal-inner::-webkit-scrollbar-thumb { background: var(--tan); }

    .modal-image-col {
      padding: 20px 16px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-right: 1px solid var(--rule);
    }
    .modal-img-frame {
      aspect-ratio: 3/4;
      background: var(--tan-light);
      position: relative;
      overflow: hidden;
    }
    /* Decorative corner ticks */
    .modal-img-frame::before,
    .modal-img-frame::after,
    .modal-img-frame .corner-br,
    .modal-img-frame .corner-bl {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--sepia);
      border-style: solid;
      border-width: 0;
    }
    .modal-img-frame::before {
      top: 6px; left: 6px;
      border-top-width: 1px;
      border-left-width: 1px;
    }
    .modal-img-frame::after {
      top: 6px; right: 6px;
      border-top-width: 1px;
      border-right-width: 1px;
    }
    .modal-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }
    .modal-img-placeholder svg { opacity: 0.25; }
    .modal-img-placeholder p {
      font-family: var(--font-body);
      font-size: 0.62rem;
      font-style: italic;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sepia);
      opacity: 0.6;
    }

    .modal-coords {
      font-family: var(--font-body);
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--ink-faint);
      text-align: center;
    }

    .modal-meta-col {
      padding: 20px 24px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-eyebrow {
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-style: italic;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sepia);
    }
    .modal-title {
      font-family: var(--font-serif);
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.15;
      color: var(--ink);
      margin-top: -4px;
    }
    .modal-byline {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
    }
    .modal-byline strong {
      color: var(--accent);
      font-weight: 400;
    }

    .modal-divider {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-divider::before,
    .modal-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .modal-divider-glyph {
      color: var(--sepia);
      font-family: var(--font-serif);
      font-size: 0.7rem;
    }

    .modal-desc {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.75;
      color: var(--ink);
      quotes: '\201C' '\201D';
    }
    .modal-desc::before { content: open-quote; }
    .modal-desc::after  { content: close-quote; }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }
    .modal-tag {
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sepia);
      border: 1px solid var(--tan);
      padding: 3px 8px;
    }

    .modal-comments-label {
      font-family: var(--font-body);
      font-size: 0.62rem;
      font-style: italic;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sepia);
      padding-top: 6px;
      border-top: 1px solid var(--rule);
    }
    .modal-comment {
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
    }
    .modal-comment:last-child { border-bottom: none; }
    .comment-author {
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
    }
    .comment-text {
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 300;
      line-height: 1.6;
      color: var(--ink);
      margin-top: 3px;
    }

    /* responsive: stack on narrow screens */
    @media (max-width: 580px) {
      .modal-inner {
        grid-template-columns: 1fr;
      }
      .modal-image-col {
        border-right: none;
        border-bottom: 1px solid var(--rule);
        padding: 16px 20px;
      }
      .modal-img-frame {
        aspect-ratio: 16/9;
        max-height: 180px;
      }
      .modal-img-frame { aspect-ratio: unset; height: 160px; }
      #side-panel { width: 100%; }
      #app-name { display: none; }
    }
  </style>
</head>
<body>

  <!-- Map -->
  <div id="map"></div>

  <!-- App Name Overlay -->
  <div id="app-name">
    The Spot
    <span>Field Journal Edition</span>
  </div>

  <!-- Hamburger -->
  <button id="menu-toggle" aria-label="Open menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <!-- Side Panel -->
  <nav id="side-panel" aria-hidden="true">
    <div class="panel-header">
      <div class="the-spot">The Spot</div>
      <div class="edition">Field Journal Edition</div>
    </div>

    <!-- Ornamental rule -->
    <div class="panel-rule">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
        <path d="M7 1 C5 3, 2 3, 1 5 C2 7, 5 7, 7 9 C9 7, 12 7, 13 5 C12 3, 9 3, 7 1Z" fill="none" stroke="currentColor" stroke-width="0.75" style="color: var(--sepia);"/>
      </svg>
    </div>

    <div class="panel-nav">
      <a href="#">Profile</a>
      <a href="#">My Spots</a>
      <a href="#">Explore</a>
      <a href="#">Networks</a>
      <a href="#" id="settings-toggle">Settings</a>
    </div>

    <!-- Settings pane -->
    <div id="settings-pane">
      <div class="settings-label">Appearance</div>
      <div class="theme-row">
        <span>Night Mode</span>
        <label class="toggle-wrap">
          <input type="checkbox" id="theme-toggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="panel-rule">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
        <path d="M7 1 C5 3, 2 3, 1 5 C2 7, 5 7, 7 9 C9 7, 12 7, 13 5 C12 3, 9 3, 7 1Z" fill="none" stroke="currentColor" stroke-width="0.75" style="color: var(--sepia);"/>
      </svg>
    </div>

    <div class="panel-footer">
      Field notes from the margins of the map.
    </div>
  </nav>

  <!-- Search bar -->
  <div id="search-wrap">
    <label>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="7"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search the field notes…" />
    </label>
  </div>

  <!-- Spot Modal -->
  <div id="spot-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-bar">
      <div class="modal-bar-line"></div>
      <div class="modal-bar-ornament">
        <svg width="20" height="10" viewBox="0 0 20 10" fill="none">
          <path d="M1 5 H7 M13 5 H19" stroke="currentColor" stroke-width="0.75"/>
          <path d="M10 1 C8 3, 7 5, 8 7 C9 8, 11 8, 12 7 C13 5, 12 3, 10 1Z" fill="none" stroke="currentColor" stroke-width="0.75"/>
        </svg>
      </div>
      <div class="modal-bar-line"></div>
      <button id="close-modal" aria-label="Close">×</button>
    </div>

    <div class="modal-inner">
      <!-- Image column -->
      <div class="modal-image-col">
        <div class="modal-img-frame">
          <div class="modal-img-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="1"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="m21 15-5-5L5 21"/>
            </svg>
            <p>No photograph</p>
          </div>
        </div>
        <div class="modal-coords" id="modal-coords">—</div>
      </div>

      <!-- Metadata column -->
      <div class="modal-meta-col">
        <div class="modal-eyebrow" id="modal-eyebrow">Field Entry</div>
        <div class="modal-title" id="modal-title">—</div>
        <div class="modal-byline" id="modal-byline">—</div>

        <div class="modal-divider">
          <span class="modal-divider-glyph">✦</span>
        </div>

        <p class="modal-desc" id="modal-desc">—</p>

        <div class="modal-tags" id="modal-tags"></div>

        <div class="modal-comments-label">Field notes from others</div>
        <div id="modal-comments"></div>
      </div>
    </div>
  </div>


  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    /* ─── SAMPLE DATA ─────────────────────────────────────────── */
    const spots = [
      {
        id: 1,
        title: "Delicate Arch Overlook",
        lat: 38.7436,
        lng: -109.4993,
        coords: "38.7436° N, 109.4993° W",
        date: "March 4, 2026",
        author: "E. Hartwell",
        desc: "Stood here an hour past sunset. The arch turns the colour of a dying ember — then nothing. The dark comes fast in canyon country. Brought a headlamp and still misjudged it.",
        tags: ["utah", "sandstone", "dusk", "arches", "desert"],
        comments: [
          { author: "T. Voss", text: "The east overlook gets you a better silhouette of the arch against the La Sals. Worth the extra half mile." },
          { author: "R. Mabley", text: "Went in January. Had the whole overlook to myself in minus ten wind chill. Absolutely worth it." }
        ]
      },
      {
        id: 2,
        title: "Eagle Peak Summit",
        lat: 37.7414,
        lng: -119.4509,
        coords: "37.7414° N, 119.4509° W",
        date: "July 18, 2025",
        author: "C. Nakamura",
        desc: "The last mile to the summit is loose granite scree, each step a negotiation. But the view from the top takes in both Yosemite Valley and the high country — two separate worlds visible at once.",
        tags: ["yosemite", "summit", "granite", "high-sierra", "scramble"],
        comments: [
          { author: "A. Delacroix", text: "Start before 5am to beat the afternoon thunderstorms. We nearly didn't make it back down." }
        ]
      },
      {
        id: 3,
        title: "Hidden Falls",
        lat: 43.7804,
        lng: -110.7319,
        coords: "43.7804° N, 110.7319° W",
        date: "September 2, 2025",
        author: "M. Okafor",
        desc: "The falls aren't hidden at all — the trail is well-marked and busy by 9am. But come in early October after the crowds thin and the aspens go yellow, and the name starts to make sense.",
        tags: ["grand-teton", "falls", "aspen", "autumn", "wyoming"],
        comments: [
          { author: "L. Strauss", text: "Saw a moose at the inlet crossing. Kept my distance. Heart rate did not." },
          { author: "H. Bergqvist", text: "October 8th was peak colour. Brought watercolours and just sat there for two hours." }
        ]
      },
      {
        id: 4,
        title: "Phantom Canyon Rim",
        lat: 38.2752,
        lng: -105.3521,
        coords: "38.2752° N, 105.3521° W",
        date: "October 27, 2025",
        author: "J. Castillo",
        desc: "The toll road winding up from Florence is half the experience — hairpin turns over a thousand feet of air, the old gold-rush grade clinging to the canyon wall. The rim view at the top is almost anticlimactic after that.",
        tags: ["colorado", "canyon", "historic-road", "gold-rush", "remote"],
        comments: [
          { author: "P. Winters", text: "Road is not suitable for low-clearance vehicles. We scraped bottom twice despite going slow." }
        ]
      }
    ];

    /* ─── PIN SVG FACTORY ─────────────────────────────────────── */
    function makePinIcon(active = false) {
      const fill   = active ? 'var(--accent)' : 'var(--sepia)';
      const center = active ? 'var(--paper)'  : 'var(--paper)';
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="24" viewBox="0 0 16 24">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 5.5 8 16 8 16S16 13.5 16 8c0-4.42-3.58-8-8-8z"
                fill="${fill}" opacity="0.88"/>
          <circle cx="8" cy="8" r="2.8" fill="${center}" opacity="0.9"/>
        </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize: [16, 24],
        iconAnchor: [8, 24],
        popupAnchor: [0, -26]
      });
    }

    /* ─── MAP INIT ────────────────────────────────────────────── */
    const isDark = () => document.documentElement.dataset.theme === 'dark';

    const tileLight = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
    const tileDark  = 'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png';

    const map = L.map('map', {
      center: [40.5, -111.5],
      zoom: 6,
      zoomControl: true
    });

    let tileLayer = L.tileLayer(tileLight, {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    /* ─── MARKERS ─────────────────────────────────────────────── */
    let activeMarkerId = null;

    const markers = spots.map(spot => {
      const marker = L.marker([spot.lat, spot.lng], { icon: makePinIcon(false) });
      marker.spotId = spot.id;

      marker.on('click', () => {
        openModal(spot);
        // update icon states
        markers.forEach(m => m.setIcon(makePinIcon(false)));
        marker.setIcon(makePinIcon(true));
        activeMarkerId = spot.id;
      });

      marker.addTo(map);
      return marker;
    });

    /* ─── MODAL ───────────────────────────────────────────────── */
    const modal      = document.getElementById('spot-modal');
    const closeBtn   = document.getElementById('close-modal');

    function openModal(spot) {
      document.getElementById('modal-eyebrow').textContent = spot.date;
      document.getElementById('modal-title').textContent   = spot.title;
      document.getElementById('modal-byline').innerHTML    =
        `Documented by <strong>${spot.author}</strong>`;
      document.getElementById('modal-coords').textContent  = spot.coords;
      document.getElementById('modal-desc').textContent    = spot.desc;

      // tags
      const tagsEl = document.getElementById('modal-tags');
      tagsEl.innerHTML = '';
      spot.tags.forEach(tag => {
        const span = document.createElement('span');
        span.className = 'modal-tag';
        span.textContent = '#' + tag;
        tagsEl.appendChild(span);
      });

      // comments
      const commentsEl = document.getElementById('modal-comments');
      commentsEl.innerHTML = '';
      spot.comments.forEach(c => {
        const div = document.createElement('div');
        div.className = 'modal-comment';
        div.innerHTML = `<div class="comment-author">${c.author}</div>
                         <div class="comment-text">${c.text}</div>`;
        commentsEl.appendChild(div);
      });

      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      // reset pins
      markers.forEach(m => m.setIcon(makePinIcon(false)));
      activeMarkerId = null;
    }

    closeBtn.addEventListener('click', closeModal);
    map.on('click', closeModal);

    /* ─── SIDE PANEL ──────────────────────────────────────────── */
    const menuToggle  = document.getElementById('menu-toggle');
    const sidePanel   = document.getElementById('side-panel');
    const settingsTgl = document.getElementById('settings-toggle');
    const settingsPane = document.getElementById('settings-pane');

    menuToggle.addEventListener('click', () => {
      const isOpen = sidePanel.classList.toggle('open');
      sidePanel.setAttribute('aria-hidden', String(!isOpen));
      menuToggle.setAttribute('aria-expanded', String(isOpen));
    });

    // Close panel on map click
    map.on('click', () => {
      sidePanel.classList.remove('open');
      sidePanel.setAttribute('aria-hidden', 'true');
    });

    settingsTgl.addEventListener('click', e => {
      e.preventDefault();
      settingsPane.classList.toggle('visible');
    });

    /* ─── THEME TOGGLE ────────────────────────────────────────── */
    const themeToggle = document.getElementById('theme-toggle');

    function applyTheme(dark) {
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      // swap tile layer
      map.removeLayer(tileLayer);
      tileLayer = L.tileLayer(dark ? tileDark : tileLight, {
        attribution: dark
          ? '© <a href="https://stadiamaps.com/">Stadia Maps</a> © <a href="https://openmaptiles.org/">OpenMapTiles</a> © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
          : '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);
    }

    themeToggle.addEventListener('change', () => {
      applyTheme(themeToggle.checked);
    });
  </script>
</body>
</html>
